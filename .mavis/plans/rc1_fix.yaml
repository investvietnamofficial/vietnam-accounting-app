      Fix: Rewrite useExceptionsReport to call /api/v1/reports/exceptions instead of client-side calculation.
      Keep same return shape so the component (web/src/app/reports/exceptions/page.tsx) needs no changes.
      Keep: isFetching, refetch, data.issues array.


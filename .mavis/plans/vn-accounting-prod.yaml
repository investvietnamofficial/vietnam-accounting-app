version: 1
plan:
  name: VN Accounting Production Transformation
  max_concurrency: 10
  max_consecutive_failures: 3
  max_cycles: 15
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [general]
    audit_sample_rate: 0.0
tasks:
  - id: phase1-audit
    title: "Phase 1 - Product Audit: KEEP vs ROADMAP classification"
    prompt: "You are the VN Accounting codebase auditor. Your job is Phase 1 of a 6-phase production transformation.\n\nPRODUCT FOCUS (the ONLY things we are building):\nUpload -> OCR -> Extract -> Verify -> Report -> Export\n\nTARGET USERS: Paying customers who need VAT-ready tax reports from uploaded accounting documents.\n\nSTART by reading these files in order:\n1. /Users/gilbertneo/Desktop/My Apps/Vietnam Accounting App/vn-accounting/AGENTS.md\n2. /Users/gilbertneo/Desktop/My Apps/Vietnam Accounting App/vn-accounting/TODO.md\n3. /Users/gilbertneo/Desktop/My Apps/Vietnam Accounting App/vn-accounting/HANDOFF.md\n\nTHEN explore the full codebase using Glob and grep to map every file:\n- Backend routes: backend/app/api/routes/ (auth, companies, documents, invoices, reports)\n- Backend services: backend/app/services/ (ocr, extraction, einvoice, tax, storage)\n- Backend workers: backend/app/workers/\n- Backend models: backend/app/models/\n- Backend migrations: backend/alembic/versions/\n- Web pages: web/src/app/ (dashboard, invoices, reports, auth flows)\n- Web components: web/src/components/\n- Web hooks: web/src/hooks/\n- Web lib: web/src/lib/\n- Mobile: mobile/lib/\n- Docker: docker-compose.yml, backend/Dockerfile, web/Dockerfile\n- Config: backend/.env.example, web/.env.local.example, backend/requirements.txt, web/package.json\n\nCLASSIFY every file/feature into one of:\n- KEEP: directly supports upload/OCR/extraction/verification/reporting/export\n- ROADMAP: useful future accounting features (journal entries, chart of accounts UI, filing workflows, multi-period calendar, payroll, inventory, bookkeeping)\n- MOBILE-ONLY: scanner-only features deferred or marked experimental\n- EXPERIMENTAL: incomplete features not ready for production\n- LEGACY: files that exist but are not used (dead deps, empty dirs)\n\nProduce a classification table: file path | feature | classification | reason\n\nTHEN update these three files:\n\n1. AGENTS.md - Rewrite the Product section. Remove references to full accounting system, ERP, payroll, inventory. The product is ONLY: Upload -> OCR -> Extract -> Verify -> Report -> Export. Update Current Reality Check section to reflect lean product. Keep all other sections intact.\n\n2. TODO.md - Rewrite all items to match the new lean scope. Remove anything not in the core flow. Add a \"Future Roadmap\" section at the bottom listing deferred features. Keep High Priority / Medium Priority / Technical Debt structure. Remove \"Future Ideas\" and fold only genuinely production-relevant items into the priority sections.\n\n3. HANDOFF.md - Update all sections: Current Repository Status, Recent Findings, Known Issues, Pending Tasks, Recommended Next Actions. Make everything consistent with the lean product focus.\n\nCOMMIT after completing: \"Phase 1: refocus product on Upload->Report core flow\"\n\nReport back with:\n- Complete KEEP vs ROADMAP classification table\n- List of files/features moved to ROADMAP\n- List of dead/experimental code\n- Summary of changes to AGENTS.md/TODO.md/HANDOFF.md\n- Commit hash\n- Any surprising findings about the codebase architecture"
    assigned_to: general
    verify_skip_reason: "Audit output is self-verifiable by reading the updated files; AGENTS.md/TODO.md/HANDOFF.md are the source of truth."
    max_retries: 1

  - id: phase2-security-ops
    title: "Phase 2+5 - Security hardening, deployment, and operations"
    prompt: "You are the VN Accounting security and deployment engineer. Your job is Phase 2 (production blockers) and Phase 5 (operations) of the production transformation.\n\nPRODUCT FOCUS: Upload -> OCR -> Extract -> Verify -> Report -> Export\nREPO: /Users/gilbertneo/Desktop/My Apps/Vietnam Accounting App/vn-accounting\n\nFIRST read the updated AGENTS.md, TODO.md to understand the current lean state.\n\nWork through these categories systematically. Make each change, verify it, then commit.\n\n=== SECURITY (Phase 2) ===\n\n1. docker-compose.yml - Remove hardcoded secrets:\n   - JWT_SECRET_KEY: dev-jwt-secret -> ${JWT_SECRET_KEY} env var\n   - Any other hardcoded passwords -> env var references\n\n2. backend/app/core/config.py - Remove dangerous defaults:\n   - Find \"changeme\" and \"changeme-jwt\" default values\n   - Remove defaults entirely OR make them raise an error in production (APP_ENV=production)\n\n3. backend/app/main.py - Disable seed_demo_data:\n   - Remove or comment out seed_demo_data() call entirely\n   - Verify it is NOT called regardless of SEED_DEMO_DATA env var\n\n4. backend/app/api/routes/auth.py - Fix password reset:\n   - The forgot_password endpoint currently returns the token in the response body\n   - Remove token from response entirely\n   - Implement SMTP email sending\n   - Create directory: backend/app/services/email/\n   - Create backend/app/services/email/__init__.py\n   - Create backend/app/services/email/email_service.py with:\n     - send_password_reset_email(to_email: str, reset_token: str) -> bool\n     - Uses SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM, SMTP_USE_TLS env vars\n     - In dev mode (APP_ENV != production), log the email to console instead of sending\n   - Wire this into the forgot_password endpoint\n   - Update backend/.env.example with SMTP variables\n\n5. backend/app/api/routes/companies.py - Fix PATCH /me:\n   - Replace raw dict handling with typed Pydantic schema\n   - Only allow updating: company_name, tax_code, address, phone, email, accounting_standard, vat_period\n   - Add proper validation\n\n6. backend/app/services/storage/r2_service.py - Audit storage:\n   - Verify R2 uploads work with proper access control\n   - Add warning comment if bucket appears public\n   - Ensure signed URL generation exists\n\n7. Add rate limiting to backend/app/api/routes/auth.py:\n   - Limit login endpoint to 5 attempts per minute per IP\n   - Use slowapi or simple in-memory rate limiter\n\n=== DEPLOYMENT (Phase 2) ===\n\n8. backend/Dockerfile - Production uvicorn:\n   - Replace CMD: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000\n   - With: CMD uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4\n   - Add HEALTHCHECK: CMD curl -f http://localhost:8000/health || exit 1\n\n9. web/Dockerfile - Production Next.js:\n   - Replace: npm run dev\n   - With: npm ci && npm run build && npm run start\n   - Set NODE_ENV=production\n   - Set NEXT_PUBLIC_API_URL via ARG\n\n10. Create docker-compose.prod.yml:\n    - Copy essential structure from docker-compose.yml\n    - APP_ENV=production, DEBUG=false\n    - restart: always for all services\n    - healthchecks for backend and web services\n    - Proper environment variable loading\n\n11. backend/.env.production.example:\n    - List ALL required env vars with descriptions\n    - Mark sensitive vars clearly\n    - Example values (non-sensitive only)\n\n12. web/.env.production.example:\n    - NEXT_PUBLIC_API_URL\n    - NEXT_PUBLIC_APP_ENV=production\n\n=== DATABASE (Phase 2) ===\n\n13. backend/alembic/versions/003_add_indexes.py:\n    - Index on invoices.invoice_date\n    - Index on invoices.verification_status\n    - Index on invoices.company_id\n    Run: cd /Users/gilbertneo/Desktop/My\\ Apps/Vietnam\\ Accounting\\ App/vn-accounting && PYTHONPATH=backend ./.venv311/bin/alembic -c backend/alembic.ini upgrade head\n\n14. Verify tenant isolation:\n    - Check all invoice and document queries filter by company_id properly\n\n=== OPERATIONS (Phase 5) ===\n\n15. backend/app/main.py - Structured logging:\n    - Import structlog\n    - Configure JSON logging for production\n    - Add request_id to all log entries\n    - Ensure tokens and passwords NEVER appear in logs\n\n16. Health checks:\n    - /health endpoint already exists -> verify it checks DB connectivity\n    - Add /healthz with deeper checks (DB, Redis, R2)\n    - Return {\"status\":\"ok\",\"env\":\"production\"} in production mode\n\n17. Error tracking:\n    - Add sentry-sdk to backend/requirements.txt if not present\n    - Add SENTRY_DSN to config\n    - Wire FastAPI exception handlers to Sentry\n    - Document in .env.production.example\n\nFor EACH change: make the edit, verify imports work, then commit.\n\nVerify backend: cd /Users/gilbertneo/Desktop/My\\ Apps/Vietnam\\ Accounting\\ App/vn-accounting && PYTHONPATH=backend ./.venv311/bin/python -c \"from backend.app.main import app; print('OK')\"\nVerify web: cd /Users/gilbertneo/Desktop/My\\ Apps/Vietnam\\ Accounting\\ App/vn-accounting/web && ./node_modules/.bin/tsc --noEmit -p tsconfig.json\n\nCommit each category separately:\n- \"Phase 2: security hardening\"\n- \"Phase 2: deployment hardening\"\n- \"Phase 5: operations observability\"\n\nReport back with:\n- List of all security fixes (file:line)\n- List of all deployment fixes\n- List of all ops fixes\n- Complete list of env vars required for production\n- All commit hashes"
    assigned_to: general
    verify_skip_reason: "Phase 6 E2E test and Phase 6 reviewer will catch any functional gaps in security/deployment/ops work."
    max_retries: 2

  - id: phase3-backend
    title: "Phase 3 - Backend operator features"
    prompt: "You are the VN Accounting backend engineer. Your job is Phase 3 backend: company settings, invoice filters, retry workflow, and complete report endpoints.\n\nPRODUCT FOCUS: Upload -> OCR -> Extract -> Verify -> Report -> Export\nREPO: /Users/gilbertneo/Desktop/My Apps/Vietnam Accounting App/vn-accounting\n\nFIRST read the updated AGENTS.md, TODO.md. Read current state of:\n- backend/app/api/routes/companies.py\n- backend/app/api/routes/invoices.py\n- backend/app/api/routes/documents.py\n- backend/app/api/routes/reports.py\n- backend/app/models/__init__.py\n- backend/app/services/tax/vn_tax_engine.py\n\n=== 1. COMPANY SETTINGS API ===\n\nbackend/app/api/routes/companies.py:\n- Create Pydantic schema CompanySettingsUpdate:\n  Fields: company_name (str), tax_code (str), address (str), phone (str), email (str), accounting_standard (Literal[\"VAS\", \"IFRS\"]), vat_period (Literal[\"monthly\", \"quarterly\"])\n- GET /me: return current company settings with all fields\n- PATCH /me: update using schema (the raw dict issue should be fixed by phase2; ensure schema is properly applied)\n\nbackend/app/models/__init__.py:\n- Check Company model for: accounting_standard (default \"VAS\"), vat_period (default \"monthly\"), fiscal_year_start_month (default 1)\n- If missing, add these fields\n- Create backend/alembic/versions/004_add_company_settings.py with migration for these fields\n\n=== 2. INVOICE FILTERS ===\n\nbackend/app/api/routes/invoices.py:\n- Add query parameters to GET /:\n  - date_from: str (ISO date YYYY-MM-DD)\n  - date_to: str (ISO date)\n  - vat_rate: float (0.0, 0.05, 0.08, 0.10)\n  - seller_name: str (partial match, case insensitive)\n  - buyer_name: str (partial match)\n  - verification_status: Literal[\"pending\", \"verified\", \"failed\"]\n  - invoice_type: Literal[\"sales\", \"purchase\"]\n  - page: int (default 1)\n  - page_size: int (default 20, max 100)\n- Return format: {\"items\": [...], \"total\": int, \"page\": int, \"page_size\": int, \"total_pages\": int}\n\n=== 3. DOCUMENT RETRY WORKFLOW ===\n\nbackend/app/api/routes/documents.py:\n- Find or create POST /documents/{document_id}/retry\n- Only allow retry when document status is \"failed\"\n- Re-trigger the document processing task (call the same logic as initial processing)\n- Return updated document with status \"pending\"\n- Return 400 if document is not in failed state\n\n=== 4. COMPLETE REPORT ENDPOINTS ===\n\nbackend/app/api/routes/reports.py:\nAll endpoints should use: year (int), period (int), period_type (Literal[\"quarterly\", \"monthly\"])\n\nGET /reports/vat-summary:\n  Returns: {\n    company_name, tax_code, period_label,\n    input_vat_total (int VND),\n    output_vat_total (int VND),\n    net_vat (int VND, positive = payable, negative = reclaimable),\n    vat_by_rate: {0.05: amount, 0.08: amount, 0.10: amount},\n    invoice_count: int,\n    filing_deadline: str (date),\n    warnings: [{type: str, message: str, invoice_ids: [int]}],\n    generated_at: str\n  }\n\nGET /reports/sales-invoices:\n  Returns: {items: [{id, invoice_number, invoice_date, seller_name, seller_tax_code, buyer_name, buyer_tax_code, subtotal, vat_rate, vat_amount, total, confidence}], total: int, period_label: str}\n\nGET /reports/purchase-invoices:\n  Same structure as sales-invoices\n\nGET /reports/exceptions:\n  Returns: {\n    issues: [\n      {type: \"missing_mst\", message: str, invoices: [...], count: int},\n      {type: \"duplicate\", message: str, invoices: [...], count: int},\n      {type: \"low_confidence\", message: str, invoices: [...], count: int},\n      {type: \"vat_mismatch\", message: str, invoices: [...], count: int}\n    ]\n  }\n\n=== 5. EXCEL EXPORT ===\n\nAll report endpoints accept ?format=excel query param.\nWhen format=excel:\n  - Content-Type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\n  - Content-Disposition: attachment; filename=\"vat-summary-2024-Q1.xlsx\"\n  - Generate XLSX using openpyxl (add to backend/requirements.txt if needed)\n\nXLSX for vat-summary:\n  - Sheet \"VAT Summary\": Company name, Tax code, Period, Generated date\n  - Input VAT, Output VAT, Net VAT\n  - Breakdown by VAT rate table\n  - Warnings list\n  - Invoice count\n\nXLSX for sales/purchase invoices:\n  - Headers: Invoice #, Date, Seller, Seller MST, Buyer, Buyer MST, Subtotal, VAT Rate, VAT Amount, Total, Confidence\n  - All invoices for the period\n  - Date formatted as DD/MM/YYYY\n  - Amounts in VND (integer)\n\n=== 6. REPORT VALIDATION WARNINGS ===\n\nbackend/app/services/tax/vn_tax_engine.py:\nAdd detection for:\n- Duplicate: same invoice_number + seller_name + invoice_date\n- Missing MST: seller_tax_code is null or empty\n- Low confidence: extraction_confidence < 0.8\n- VAT mismatch: VAT amount does not match subtotal * vat_rate\n\nFor EACH change: read file first, make minimal targeted changes, verify imports work.\n\nVerify: cd /Users/gilbertneo/Desktop/My\\ Apps/Vietnam\\ Accounting\\ App/vn-accounting && PYTHONPATH=backend ./.venv311/bin/python -c \"from backend.app.main import app; print('OK')\"\n\nCommit each feature separately with clear messages.\n\nReport: endpoints added/updated, new schemas, new migrations, commit hashes, any blockers."
    assigned_to: general
    verify_skip_reason: "Phase 6 E2E test will verify backend endpoints work end-to-end and catch any missing features."
    max_retries: 2

  - id: phase3-web
    title: "Phase 3 Web UI and Phase 4 Report Quality"
    prompt: "You are the VN Accounting web frontend engineer. Your job is Phase 3 web UI and Phase 4 report quality.\n\nPRODUCT FOCUS: Upload -> OCR -> Extract -> Verify -> Report -> Export\nREPO: /Users/gilbertneo/Desktop/My Apps/Vietnam Accounting App/vn-accounting/web\n\nFIRST read AGENTS.md, TODO.md. Read current state of:\n- web/src/app/ (find all page files)\n- web/src/components/\n- web/src/lib/api.ts\n- web/src/types/index.ts\n- web/package.json\n- Also read the backend route files to know what endpoints exist: ../backend/app/api/routes/\n\nBuild these web features:\n\n=== 1. DOCUMENT UPLOAD & STATUS (web/src/app/documents/page.tsx) ===\n- Drag-and-drop file upload zone\n- Supported: image/*, application/pdf\n- Show upload progress bar\n- After upload: poll GET /api/v1/documents/{id} every 2s while pending/processing\n- Status badges: uploaded (gray), processing (yellow), extracted (blue), verified (green), failed (red)\n- After extraction: show preview card with invoice data: invoice number, date, seller, amount, VAT, confidence score\n- Failed documents: show error message and \"Retry\" button\n- List of recent documents below the upload area\n\n=== 2. INVOICE LIST WITH FILTERS (web/src/app/invoices/page.tsx) ===\n- Filter bar:\n  - Date range: two date inputs (date_from, date_to)\n  - VAT rate dropdown: All, 0%, 5%, 8%, 10%\n  - Seller search input\n  - Verification status tabs: All | Verified | Pending | Failed (with counts if available)\n- Paginated table:\n  Columns: Invoice # | Date | Seller | Buyer | Amount | VAT | Status | Confidence\n- Status badges: green=verified, yellow=pending, red=failed\n- Click row to open invoice detail modal\n- Pull-to-refresh on mobile\n\n=== 3. DOCUMENT RETRY UI ===\n- In documents list, failed documents show \"Retry\" button\n- POST /api/v1/documents/{id}/retry on click\n- Show loading spinner during retry\n- Update document status when complete\n\n=== 4. COMPANY SETTINGS PAGE (web/src/app/settings/page.tsx) ===\n- GET /api/v1/companies/me on page load to populate form\n- Form fields:\n  - Company name, Tax code (MST), Address, Phone, Email\n  - Accounting standard: radio buttons (VAS / IFRS)\n  - VAT filing period: radio buttons (Monthly / Quarterly)\n  - Fiscal year start month: dropdown 1-12\n- PATCH /api/v1/companies/me on save\n- Show loading state while saving\n- Show success toast on save, error toast on failure\n- Use React Query mutations\n\n=== 5. VAT SUMMARY REPORT (web/src/app/reports/vat-summary/page.tsx) ===\n- Period selector row:\n  - Year: dropdown (current year and previous 2 years)\n  - Period type: radio (Monthly / Quarterly)\n  - Period: dropdown (1-4 for quarterly, 1-12 for monthly)\n- \"Generate Report\" button -> GET /api/v1/reports/vat-summary\n- Results display:\n  - Company name and tax code header\n  - Summary cards: Input VAT | Output VAT | Net VAT (highlight payable vs reclaimable)\n  - VAT by rate breakdown table\n  - Filing deadline\n  - Warnings list (if any issues found)\n- \"Export Excel\" button -> GET with ?format=excel\n- Loading and error states\n\n=== 6. SALES INVOICES REPORT (web/src/app/reports/sales-invoices/page.tsx) ===\n- Period selector (same as VAT summary)\n- \"Generate\" button -> GET /api/v1/reports/sales-invoices\n- Table: Invoice #, Date, Seller, Seller MST, Buyer, Buyer MST, Subtotal, VAT Rate, VAT Amount, Total, Confidence\n- \"Export Excel\" button\n- Pagination if > 50 invoices\n\n=== 7. PURCHASE INVOICES REPORT (web/src/app/reports/purchase-invoices/page.tsx) ===\n- Same pattern as sales-invoices\n\n=== 8. EXCEPTIONS REPORT (web/src/app/reports/exceptions/page.tsx) ===\n- Period selector\n- \"Generate\" button -> GET /api/v1/reports/exceptions\n- Grouped by issue type with icons:\n  - Missing MST (warning icon, list of invoices)\n  - Duplicate invoices (copy icon, list with invoice numbers)\n  - Low confidence extractions (alert icon, list with confidence scores)\n  - VAT mismatches (error icon, list)\n- Each group shows count and expandable invoice list\n- Click invoice to navigate to invoice detail\n\n=== 9. NAVIGATION UPDATE ===\n- web/src/components/sidebar.tsx or navigation component\n- Add sidebar items:\n  - Documents (icon: file-text, route: /documents)\n  - Invoices (icon: receipt, route: /invoices)\n  - Reports (icon: bar-chart, route: /reports) -> expand to show sub-items:\n    - VAT Summary\n    - Sales Invoices\n    - Purchase Invoices\n    - Exceptions\n  - Settings (icon: settings, route: /settings)\n- Mobile Scanner: move to \"Experimental\" section or remove from main nav\n- Use existing UI patterns (Tailwind, lucide-react)\n\n=== 10. UPDATE TYPES (web/src/types/index.ts) ===\nAdd all new types:\n- CompanySettings (company_name, tax_code, address, phone, email, accounting_standard, vat_period, fiscal_year_start_month)\n- InvoiceListResponse (items, total, page, page_size, total_pages)\n- DocumentStatus (uploaded, pending, processing, extracted, verified, failed)\n- VatSummaryReport (all fields from backend)\n- SalesInvoicesReport (items, total, period_label)\n- PurchaseInvoicesReport (same)\n- ExceptionsReport (issues array)\n- ReportWarning (type, message, invoice_ids)\n\nFor EACH page: read existing patterns first. Use Tailwind CSS. Use React Query for data fetching. Use existing API client in lib/api.ts.\n\nRun typecheck after changes: cd /Users/gilbertneo/Desktop/My\\ Apps/Vietnam\\ Accounting\\ App/vn-accounting/web && ./node_modules/.bin/tsc --noEmit -p tsconfig.json\nFix all TypeScript errors.\n\nCommit each feature: \"Phase 3: document upload UI\", \"Phase 3: invoice filters UI\", \"Phase 3: company settings UI\", \"Phase 3: report pages\", \"Phase 4: report quality\"\n\nReport: pages created/updated, components created, types updated, TS errors fixed, commit hashes."
    assigned_to: general
    verify_skip_reason: "Phase 6 E2E test validates all web features functionally and TypeScript compilation is the code quality gate."
    max_retries: 2

  - id: phase6-deploy
    title: "Phase 6 - Production deployment, E2E testing, and final report"
    prompt: "You are the VN Accounting deployment and QA engineer. Phase 6: production deployment readiness and end-to-end testing.\n\nREPO: /Users/gilbertneo/Desktop/My Apps/Vietnam Accounting App/vn-accounting\n\nIMPORTANT: Check plan status first. phase2-security-ops, phase3-backend, and phase3-web must all be complete before starting this task. Monitor plan messages and wait if needed. Do not start if those tasks are still running.\n\nOnce all prior phases complete:\n\n=== 1. PRODUCTION_READINESS_CHECKLIST.md ===\nCreate this file in the repo root with these sections:\n\n## Required Environment Variables\nList ALL required vars for backend and web production deploy.\nMark which are sensitive (secrets) vs public.\n\n## Security Checklist\nCross-check against Phase 2 security work:\n- [ ] No hardcoded secrets in docker-compose.yml\n- [ ] No dev-jwt-secret in production config\n- [ ] seed_demo_data disabled\n- [ ] Password reset tokens not in response body\n- [ ] Company PATCH uses typed schema\n- [ ] R2 bucket access controlled\n- [ ] SMTP configured for real email\n- [ ] Rate limiting on auth endpoints\n\n## Deployment Checklist\n- [ ] Backend Dockerfile uses production uvicorn (--workers)\n- [ ] Web Dockerfile runs next build + next start\n- [ ] docker-compose.prod.yml created\n- [ ] All database migrations run\n- [ ] Health checks pass for all services\n- [ ] Environment variables documented\n\n## Operations Checklist\n- [ ] Structured JSON logging configured\n- [ ] Sentry DSN documented\n- [ ] /health returns {\"status\":\"ok\",\"env\":\"production\"}\n- [ ] /healthz returns deep check results\n\n## Backup Strategy\n- Postgres: daily automated backup (pg_dump to R2 or local volume)\n- Document files: backed up with Postgres snapshots\n- RTO: 1 hour\n- RPO: 24 hours\n\n## Rollback Plan\n- Image rollback: docker-compose pull && docker-compose up -d (previous image tag)\n- Database rollback: alembic downgrade <prev_revision>\n- Notification: Slack/email notification procedure\n\n=== 2. docker-compose.prod.yml ===\nCreate production Docker Compose file:\n- Based on docker-compose.yml structure\n- Set APP_ENV=production, DEBUG=false\n- Set restart: always for backend, worker, web, postgres, redis\n- Add healthcheck for backend: curl -f http://localhost:8000/health\n- Add healthcheck for web: curl -f http://localhost:3000\n- Remove any dev-only services/volumes\n- Use env_file for production env vars\n\n=== 3. scripts/e2e-test.sh ===\nCreate comprehensive E2E smoke test script:\n\n#!/bin/bash\nset -e\nBASE_URL=${1:-http://localhost:8000}\necho \"=== VN Accounting E2E Smoke Test ===\"\necho \"Testing: $BASE_URL\"\n\n# 1. Health check\necho \"1. Health check...\"\ncurl -sf \"$BASE_URL/health\" | grep -q \"ok\" && echo \"PASS\" || echo \"FAIL\"\n\n# 2. Register test account\necho \"2. Register...\"\nTS=$(date +%s)\nEMAIL=\"e2e-$TS@test.com\"\nRESP=$(curl -sf -X POST \"$BASE_URL/api/v1/auth/register\" \\\n  -H \"Content-Type: application/json\" \\\n  -d \"{\\\"email\\\":\\\"$EMAIL\\\",\\\"password\\\":\\\"Test123456!\\\",\\\"company_name\\\":\\\"E2E Corp\\\",\\\"tax_code\\\":\\\"0123456789\\\"}\" || echo \"FAIL\")\necho \"$RESP\" | grep -q \"access_token\" && echo \"PASS\" || echo \"FAIL\"\n\n# 3. Login\necho \"3. Login...\"\nTOKEN=$(curl -sf -X POST \"$BASE_URL/api/v1/auth/token\" \\\n  -d \"username=$EMAIL&password=Test123456!\" | python3 -c \"import sys,json; print(json.load(sys.stdin)['access_token'])\" 2>/dev/null)\n[ -n \"$TOKEN\" ] && echo \"PASS ($TOKEN)\" || echo \"FAIL\"\n\n# 4. Company profile\necho \"4. Company profile...\"\ncurl -sf -H \"Authorization: Bearer $TOKEN\" \"$BASE_URL/api/v1/companies/me\" | grep -q \"company_name\" && echo \"PASS\" || echo \"FAIL\"\n\n# 5. Update company settings\necho \"5. Update settings...\"\ncurl -sf -X PATCH -H \"Authorization: Bearer $TOKEN\" \\\n  -H \"Content-Type: application/json\" \\\n  -d '{\"company_name\":\"E2E Corp Updated\",\"accounting_standard\":\"VAS\",\"vat_period\":\"monthly\"}' \\\n  \"$BASE_URL/api/v1/companies/me\" | grep -q \"E2E Corp Updated\" && echo \"PASS\" || echo \"FAIL\"\n\n# 6. Invoice list (empty)\necho \"6. Invoice list...\"\ncurl -sf -H \"Authorization: Bearer $TOKEN\" \"$BASE_URL/api/v1/invoices\" | grep -q \"items\" && echo \"PASS\" || echo \"FAIL\"\n\n# 7. Invoice filters\necho \"7. Invoice filters...\"\ncurl -sf -H \"Authorization: Bearer $TOKEN\" \\\n  \"$BASE_URL/api/v1/invoices?date_from=2024-01-01&date_to=2024-12-31&verification_status=pending\" \\\n  | grep -q \"items\" && echo \"PASS\" || echo \"FAIL\"\n\n# 8. VAT summary report\necho \"8. VAT summary...\"\ncurl -sf -H \"Authorization: Bearer $TOKEN\" \\\n  \"$BASE_URL/api/v1/reports/vat-summary?year=2024&period=1&period_type=quarterly\" \\\n  | grep -q \"input_vat_total\" && echo \"PASS\" || echo \"FAIL\"\n\n# 9. Sales invoices report\necho \"9. Sales invoices...\"\ncurl -sf -H \"Authorization: Bearer $TOKEN\" \\\n  \"$BASE_URL/api/v1/reports/sales-invoices?year=2024&period=1&period_type=quarterly\" \\\n  | grep -q \"items\" && echo \"PASS\" || echo \"FAIL\"\n\n# 10. Purchase invoices report\necho \"10. Purchase invoices...\"\ncurl -sf -H \"Authorization: Bearer $TOKEN\" \\\n  \"$BASE_URL/api/v1/reports/purchase-invoices?year=2024&period=1&period_type=quarterly\" \\\n  | grep -q \"items\" && echo \"PASS\" || echo \"FAIL\"\n\n# 11. Exceptions report\necho \"11. Exceptions...\"\ncurl -sf -H \"Authorization: Bearer $TOKEN\" \\\n  \"$BASE_URL/api/v1/reports/exceptions?year=2024&period=1&period_type=quarterly\" \\\n  | grep -q \"issues\" && echo \"PASS\" || echo \"FAIL\"\n\n# 12. Excel export (check content-type)\necho \"12. Excel export...\"\ncurl -sf -H \"Authorization: Bearer $TOKEN\" \\\n  \"$BASE_URL/api/v1/reports/vat-summary?year=2024&period=1&period_type=quarterly&format=excel\" \\\n  -I | grep -qi \"spreadsheet\" && echo \"PASS\" || echo \"FAIL\"\n\necho \"=== E2E Complete ===\"\n\nMake executable with chmod +x.\n\nIf the local stack is running (docker compose up), run the script and record results.\nIf not running, document what tests would pass and which need a live environment.\n\n=== 4. PRODUCTION_STATUS.md ===\nCreate final status report:\n\n## Production Readiness Score: X%\nScore = (Security items passed / 17) * 17 + (Deployment items passed / 15) * 15 + (Core features / 30) + (Report quality / 20) + (Operations / 10) + (E2E tests / 8)\n\n## Remaining Blockers\nAnything not completed that blocks production\n\n## Security Findings\nSummary of all security issues found and their status\n\n## Deployment Status\nURL (if deployed), docker-compose.prod.yml status\n\n## E2E Test Results\nPass/fail count for each test\n\n## Recommended Next Actions\nTop 5 prioritized next steps\n\n=== 5. FINAL COMMIT ===\n\"Phase 6: production deployment readiness and E2E tests\"\n\nPush to GitHub if remote is configured.\n\nReport: checklist summary, compose file created, E2E results, readiness score, blockers, findings, next actions."

name: vn_accounting_scanner
description: Vietnam accounting invoice scanner app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera & image
  camera: ^0.10.5+9
  image_picker: ^1.1.1
  image_cropper: ^7.0.0
  flutter_image_compress: ^2.2.0

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.1

  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  lottie: ^3.1.0
  file_picker: ^8.0.3

  # Utils
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

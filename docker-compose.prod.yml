# Production docker-compose manifest for VN Accounting
# Usage: docker compose -f docker-compose.prod.yml up --build
#
# Required env vars (set in Coolify):
#   APP_SECRET_KEY, JWT_SECRET_KEY
#   POSTGRES_PASSWORD
#   DATABASE_URL, DATABASE_URL_SYNC
#   REDIS_URL
#   ALLOWED_ORIGINS
#
# Optional:
#   NEXT_PUBLIC_API_URL, USE_CELERY, ANTHROPIC_API_KEY
#   SMTP_*, SENTRY_DSN, R2_*, GDT_*, OCR_*

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vn_accounting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vn_accounting}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      LOCAL_STORAGE_DIR: /app/storage
      USE_CELERY: "${USE_CELERY:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
        NEXT_PUBLIC_APP_ENV: production
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
      NEXT_PUBLIC_APP_ENV: production
    depends_on:
      - backend

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      USE_CELERY: "${USE_CELERY:-false}"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/app/storage
    profiles:
      - worker
    command: >
      bash -lc "alembic -c alembic.ini upgrade head &&
      celery -A app.workers.celery_app worker --loglevel=info --concurrency=4"

volumes:
  postgres_prod_data:
  app_storage:

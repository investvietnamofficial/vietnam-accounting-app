services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: vn_accounting
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: vn_accounting

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_ENV: production
      APP_SECRET_KEY: testsecret123456789012345678901234567890
      JWT_SECRET_KEY: testjwt123456789012345678901234567890
      DATABASE_URL: postgresql+asyncpg://vn_accounting:testpass123@postgres:5432/vn_accounting
      DATABASE_URL_SYNC: postgresql://vn_accounting:testpass123@postgres:5432/vn_accounting
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost
    depends_on:
      - postgres
      - redis
